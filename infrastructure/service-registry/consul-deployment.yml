apiVersion: v1
kind: Service
metadata:
  name: consul-internal
spec:
  clusterIP: None
  selector:
    app: consul
  ports:
    - name: http
      port: 8500

---
apiVersion: v1
kind: Service
metadata:
  name: consul
spec:
  type: NodePort
  selector:
    app: consul
  ports:
    - name: http
      port: 8500
      targetPort: 8500
      nodePort: 30500

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: consul
spec:
  serviceName: consul-internal
  replicas: 3

  selector:
    matchLabels:
      app: consul

  template:
    metadata:
      labels:
        app: consul

    spec:
      containers:
      - name: consul
        image: hashicorp/consul:latest

        args:
          - agent
          - -server
          - -ui
          - -client=0.0.0.0
          - -bootstrap-expect=3

          - -retry-join=consul-0.consul-internal
          - -retry-join=consul-1.consul-internal
          - -retry-join=consul-2.consul-internal

          - -data-dir=/consul/data

        ports:
        - containerPort: 8500
          name: http

        - containerPort: 8300
          name: server

        - containerPort: 8301
          name: serflan

        - containerPort: 8302
          name: serfwan

        - containerPort: 8600
          protocol: UDP
          name: dns

        volumeMounts:
        - name: consul-data
          mountPath: /consul/data

  volumeClaimTemplates:

  - metadata:
      name: consul-data

    spec:
      accessModes:
      - ReadWriteOnce

      resources:
        requests:
          storage: 1Gi