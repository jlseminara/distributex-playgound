apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-express
spec:
  replicas: 1

  selector:
    matchLabels:
      app: mongo-express

  template:
    metadata:
      labels:
        app: mongo-express

    spec:
      containers:
      - name: mongo-express
        image: mongo-express:latest
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8081

        env:
        - name: ME_CONFIG_MONGODB_URL
          value: mongodb://mongodb-0.mongodb:27017,mongodb-1.mongodb:27017,mongodb-2.mongodb:27017/?replicaSet=rs0

        - name: ME_CONFIG_BASICAUTH_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongo-express-secret
              key: ME_CONFIG_BASICAUTH_USERNAME

        - name: ME_CONFIG_BASICAUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongo-express-secret
              key: ME_CONFIG_BASICAUTH_PASSWORD

        startupProbe:
          httpGet:
            path: /
            port: 8081
            httpHeaders:
              - name: Authorization
                value: Basic YWRtaW46YWRtaW4=
          failureThreshold: 30
          periodSeconds: 5

        readinessProbe:
          httpGet:
            path: /
            port: 8081
            httpHeaders:
              - name: Authorization
                value: Basic YWRtaW46YWRtaW4=
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /
            port: 8081
            httpHeaders:
              - name: Authorization
                value: Basic YWRtaW46YWRtaW4=
          initialDelaySeconds: 60
          periodSeconds: 20
