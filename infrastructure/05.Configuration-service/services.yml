apiVersion: v1
kind: Service
metadata:
  name: configserver-service
spec:
  type: ClusterIP
  selector:
    app: configserver
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: configserver-local
spec:
  type: LoadBalancer
  selector:
    app: configserver
  ports:
    - port: 8090
      targetPort: 8080
