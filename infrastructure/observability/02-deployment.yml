# 02-deployment.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lgtm-stack
  labels:
    app: lgtm-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lgtm-stack
  template:
    metadata:
      labels:
        app: lgtm-stack
    spec:
      containers:
        - name: lgtm
          image: grafana/otel-lgtm:latest
          ports:
            - name: grafana-ui
              containerPort: 3000
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: storage
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: lgtm-storage
