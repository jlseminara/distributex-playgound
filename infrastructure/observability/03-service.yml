# 03-service.yml
apiVersion: v1
kind: Service
metadata:
  name: lgtm-stack
  labels:
    app: lgtm-stack
spec:
  type: ClusterIP
  selector:
    app: lgtm-stack
  ports:
    - name: grafana-ui
      port: 3000
      targetPort: 3000
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
